<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KenSite</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
      background-image: url("backg.png");
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center ;
      margin: 0;
      min-height: 100vh;
      padding: 50px 5%;
      transform : scale(0);
      animation: zoom-in 1s ease forwards;
}

.container {
            position: relative;
            height: 650px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 30px;
            background: rgba(243, 232, 232, 0.08);
            backdrop-filter: blur(7px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            transform : scale(0);
            animation: zoom-in 1s ease forwards;
}

@keyframes zoom-in {
    100%{ transform: scale(1);}
}


.header {
    position: absolute;
    top: 0;
    left: 0;
    margin: 100%;
    padding: 25px 5%;
    background: #115ed3;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 80px;
}

.logo{
    font-size:24px;
    font-weight:700;
    color:#ebedf1;
}

nav ul{
    list-style:none;
    display:flex;
    align-items:center;
    gap:30px;
}

nav ul li a{
    text-decoration:none;
    color:#ebe1e1;
    font-weight:500;
    transition:0.3s;
}

nav ul li a:hover{
    color:#f34444;
}

.contact-btn{
    background:#2068ee;
    color:#fff;
    padding:10px 20px;
    border-radius:20px;
    cursor: pointer;
}

/* HERO */
.hero{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:50px 80px;
    min-height:85vh;
}

/* IMAGE */
.hero-img{
    width:45%;
    display:flex;
    justify-content:center;
}

.circle{
    width:380px;
    height:380px;
    border-radius:50%;
    border:3px solid #f7f3f3;
    padding:15px;
}

.circle img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
}

/* TEXT */
.hero-text{
    width:50%;
}

.hero-text h1{
    font-size:42px;
    margin-bottom:10px;
}

.hero-text h1 span{
    color:#31c8f7;
}

.hero-text h2{
    font-size:28px;
    margin-bottom:15px;
}

.hero-text h2 span{
    color:#3fb0f1;
    font-weight:600;
}

.hero-text p{
    color:#f0e6e6;
    line-height:1.6;
    margin-bottom:20px;
}

.social{
    margin-bottom:20px;
}

.wrapper .button{
    display:inline-block;
    align-items:center;
    justify-content:center;
    width:60px;
    height:60px;
    float: left;
    overflow: hidden;
    margin: 0 5px;
    border-radius: 50px;
   background: #faf6f6;
   cursor: pointer;
    transition:all 0.3s ease-out;
}

.wrapper .button .icon{
    display: inline-block;
     width:60px;
    height:60px;
    text-align: center;
    border-radius:50px;
    box-sizing: border-box;
    line-height: 60px;
}

.wrapper .button:nth-child(1):hover .icon{
    background: #2068ee;
    transition:all 0.3s ease-out;
}

.wrapper .button:nth-child(2):hover .icon{
    background: #070707;
    transition:all 0.3s ease-out;
}

.wrapper .button:nth-child(3):hover .icon{
    background: #ee5d89;
    transition:all 0.3s ease-out;
}

.wrapper .button .icon i{
font-size: 25px;
line-height: 60px;
transition:all 0.3s ease-out;
}

.wrapper .button:hover .icon i{
    color: #ebf1f1;
}

.wrapper .button span{
font-size: 20px;
font-weight: 500;
line-height: 60px;
margin-left: 10px;
transition:all 0.3s ease-out;
}

.wrapper .button:nth-child(1) span{
   color: #3390e7;
}

.wrapper .button:nth-child(2) span{
   color: #070707;
}

.wrapper .button:nth-child(3) span{
    color: #ee5d89;
}

.wrapper .button:hover{
    width: 200px;
}

.cv-btn{
    display:inline-block;
    background:#2ca5f0;
    color:#fff;
    padding:12px 25px;
    border-radius:8px;
    text-decoration:none;
    transition:0.3s;
}

.cv-btn:hover{
    background:#3786e0;
}

@media(max-width:992px){
    .hero{
        flex-direction:column;
        text-align:center;
    }

    .hero-img, .hero-text{
        width:100%;
    }

    .hero-img{
        margin-bottom:40px;
    }

    nav{
        padding:20px 40px;
    }
}
</style>
</head>

<nav>

        </p>
        <br>


        <div class="wrapper">
            <div class="button">

            <span>Facebook</span>

            <span>Tiktok</span>
            </div>
            <div class="button">
            <div class="icon"><a href="https://www.instagram.com/ken_niieee?igsh=d28wcXUxa3o1ZmQy"><i class="fab fa-instagram"></i></a></div>
            <span>Instagram</span>

</header>

</html>
